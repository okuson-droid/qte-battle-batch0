<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QTE Battle - 対戦</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/battle.css}" rel="stylesheet">
</head>
<body class="bg-dark text-light">
<div class="container-fluid py-2" style="max-width: 1200px">

    <div class="d-flex justify-content-between align-items-center mb-2">
        <div>
            部屋コード: <strong id="room-code" class="text-warning" th:text="${roomId}">------</strong>
            <span class="ms-3 text-muted" id="connection-status">接続中...</span>
        </div>
        <div>
            <button id="btn-auto-mode" class="btn btn-sm btn-outline-light me-2"
                    onclick="toggleAutoMode()">進行: 手動</button>
            <span id="phase-indicator" class="fs-5"></span>
        </div>
    </div>

    <!-- 相手エリア -->
    <div class="board-side opponent-side p-2 rounded mb-2">
        <div class="d-flex align-items-center gap-3 mb-2">
            <div id="opp-leader" class="leader-card rounded text-center">
                <div class="small" id="opp-leader-name">?</div>
                <div class="fs-4 fw-bold" id="opp-lp">-</div>
            </div>
            <div class="small">
                <div>手札: <span id="opp-hand-count">-</span>枚</div>
                <div>山札: <span id="opp-deck-count">-</span>枚</div>
                <div>MP: <span id="opp-mp">-</span> /
                    <a href="#" id="opp-mana-link" onclick="showManaList(false); return false;"
                       class="link-info">マナ<span id="opp-mana-count">-</span>枚</a></div>
                <div><a href="#" onclick="showTrashList(false); return false;"
                       class="link-info">墓地: <span id="opp-trash-count">-</span>枚</a>
                    / <a href="#" onclick="showLostList(false); return false;"
                       class="link-info">消滅: <span id="opp-lost-count">-</span>枚</a></div>
                <div>禁忌: <span id="opp-taboo-count">-</span>枚(非公開)</div>
                <div>ウェポン: <span id="opp-weapon">なし</span></div>
                <a href="#" onclick="showLeaderInfo(false); return false;" class="link-info small">リーダー能力を確認</a>
                <div id="opp-mana-row" class="mana-row mt-1"></div>
            </div>
        </div>
        <div id="opp-minions" class="minion-row"></div>
    </div>

    <!-- 中央: フェイズ操作とログ -->
    <div class="row g-2 mb-2">
        <div class="col-md-8">
            <div id="message-area" class="alert alert-info py-2 mb-2 d-none"></div>
            <div id="choose-order-area" class="d-none">
                <span class="me-2">ダイスに勝ちました。先攻/後攻を選んでください:</span>
                <button class="btn btn-warning btn-sm" onclick="chooseOrder(true)">先攻をとる</button>
                <button class="btn btn-outline-warning btn-sm" onclick="chooseOrder(false)">後攻をとる</button>
            </div>
            <div id="selection-area" class="alert alert-warning py-2 mb-2 d-none">
                <span id="selection-prompt"></span>
                <button id="btn-skip-target" class="btn btn-sm btn-outline-dark ms-2 d-none"
                        onclick="skipRequirement()">選ばない</button>
                <button class="btn btn-sm btn-outline-dark ms-2" onclick="cancelSelection()">キャンセル</button>
            </div>
            <div id="mulligan-area" class="alert alert-primary py-2 mb-2 d-none">
                <span>マリガン: 引き直したいカードを手札からクリックで選択(<span id="mulligan-count">0</span>枚選択中)</span>
                <button class="btn btn-sm btn-warning ms-2" onclick="submitMulligan()">この内容で確定</button>
                <button class="btn btn-sm btn-outline-dark ms-2" onclick="keepHand()">引き直さない</button>
            </div>
            <div id="turn-controls" class="d-none">
                <button id="btn-next-phase" class="btn btn-primary btn-sm" onclick="nextPhase()">次のフェイズへ</button>
                <button id="btn-end-turn" class="btn btn-outline-danger btn-sm" onclick="endTurn()">ターン終了</button>
            </div>
        </div>
        <div class="col-md-4">
            <div id="log-area" class="log-box small rounded p-2"></div>
        </div>
    </div>

    <!-- 自分エリア -->
    <div class="board-side my-side p-2 rounded">
        <div id="my-minions" class="minion-row mb-2"></div>
        <div class="d-flex align-items-center gap-3 mb-2">
            <div id="my-leader" class="leader-card rounded text-center">
                <div class="small" id="my-leader-name">?</div>
                <div class="fs-4 fw-bold" id="my-lp">-</div>
            </div>
            <div class="small">
                <div>山札: <span id="my-deck-count">-</span>枚</div>
                <div>MP: <span id="my-mp" class="fw-bold text-info">-</span> /
                    <a href="#" onclick="showManaList(true); return false;"
                       class="link-info">マナ<span id="my-mana-count">-</span>枚</a></div>
                <div><a href="#" onclick="showTrashList(true); return false;"
                       class="link-info">墓地: <span id="my-trash-count">-</span>枚</a>
                    / <a href="#" onclick="showLostList(true); return false;"
                       class="link-info">消滅: <span id="my-lost-count">-</span>枚</a></div>
                <div>ウェポン: <span id="my-weapon">なし</span></div>
                <a href="#" onclick="showLeaderInfo(true); return false;" class="link-info small">リーダー能力を確認</a>
                <button id="btn-leader-ability" class="btn btn-sm btn-outline-info mt-1 d-none"
                        onclick="useLeaderAbility()">リーダー能力</button>
                <div id="my-mana-row" class="mana-row mt-1"></div>
            </div>
        </div>
        <div class="small text-muted mb-1">手札(クリックで使用)</div>
        <div id="my-hand" class="hand-row"></div>

        <div class="small text-muted mt-2 mb-1">
            禁忌デッキ(<span id="my-taboo-count">0</span>枚・自分のみ閲覧可 / メインフェイズにマナで支払って使用)
        </div>
        <div id="my-taboo" class="hand-row taboo-row"></div>
    </div>
</div>

<!-- 汎用の情報モーダル(墓地・マナ・リーダー能力の一覧表示に使う) -->
<div id="info-modal" class="info-modal d-none" onclick="hideModal()">
    <div class="info-modal-body" onclick="event.stopPropagation()">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <strong id="info-modal-title"></strong>
            <button class="btn btn-sm btn-outline-light" onclick="hideModal()">閉じる</button>
        </div>
        <div id="info-modal-content" class="small"></div>
    </div>
</div>

<script th:inline="javascript">
    const ROOM_ID = /*[[${roomId}]]*/ '';
    const PLAYER_ID = /*[[${playerId}]]*/ '';
</script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
<script th:src="@{/js/battle.js}"></script>
</body>
</html>
