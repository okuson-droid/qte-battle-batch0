<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QTE - デッキビルダー</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/deck-builder.css(v=9)}" rel="stylesheet">
</head>
<body class="bg-dark text-light">
<div class="container-fluid py-2">

    <div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2">
        <div class="d-flex align-items-center gap-2">
            <h1 class="h5 mb-0 text-warning">デッキビルダー</h1>
            <a th:href="@{/}" class="btn btn-sm btn-outline-light">ロビーへ</a>
        </div>
        <div class="d-flex align-items-center gap-2 flex-wrap">
            <input id="deck-name" class="form-control form-control-sm" style="width: 180px"
                   value="MyDeck" placeholder="デッキ名">
            <select id="leader-select" class="form-select form-select-sm" style="width: 220px"></select>
            <label class="btn btn-sm btn-outline-info mb-0">
                デッキを読み込む
                <input type="file" accept=".json" hidden onchange="importDeck(this)">
            </label>
            <button class="btn btn-sm btn-success" onclick="exportDeck()">デッキファイルを出力</button>
        </div>
    </div>

    <div id="status-bar" class="alert alert-secondary py-2 mb-2 small"></div>

    <div class="row g-2">
        <!-- 左: カードプール -->
        <div class="col-lg-7">
            <div class="panel p-2">
                <div class="d-flex gap-2 align-items-center mb-2 flex-wrap">
                    <strong class="small">カードプール</strong>
                    <div class="btn-group btn-group-sm" role="group">
                        <button class="btn btn-outline-light active" data-pool="MAIN"
                                onclick="switchPool('MAIN')">メイン用(同文明)</button>
                        <button class="btn btn-outline-light" data-pool="TABOO"
                                onclick="switchPool('TABOO')">禁忌用(他文明)</button>
                    </div>
                    <input id="search" class="form-control form-control-sm ms-auto" style="width: 160px"
                           placeholder="名前で検索" oninput="render()">
                </div>
                <div class="d-flex gap-1 mb-2 flex-wrap small">
                    <span class="text-muted me-1">種類:</span>
                    <button class="btn btn-sm btn-outline-secondary flt on" data-type="MINION"
                            onclick="toggleType(this)">ミニオン</button>
                    <button class="btn btn-sm btn-outline-secondary flt on" data-type="SPELL"
                            onclick="toggleType(this)">スペル</button>
                    <button class="btn btn-sm btn-outline-secondary flt on" data-type="WEAPON"
                            onclick="toggleType(this)">ウェポン</button>
                </div>
                <div id="pool" class="card-grid"></div>
            </div>
        </div>

        <!-- 右: 構築中のデッキ -->
        <div class="col-lg-5">
            <div class="panel p-2 mb-2">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <strong class="small">メインデッキ</strong>
                    <span id="main-count" class="badge bg-secondary">0 / 40</span>
                </div>
                <div id="deck-main" class="deck-list"></div>
            </div>
            <div class="panel p-2">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <strong class="small">禁忌デッキ(他文明・同名1枚まで)</strong>
                    <span id="taboo-count" class="badge bg-secondary">0 / 8</span>
                </div>
                <div id="deck-taboo" class="deck-list"></div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/deck-builder.js(v=9)}"></script>
</body>
</html>
