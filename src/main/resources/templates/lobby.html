<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QTE Battle - ロビー</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width: 760px">
    <h1 class="mb-1">クイン・タブーエレメンタル</h1>
    <p class="text-muted mb-3">
        部屋を作って、表示された部屋コードを対戦相手に伝えてください。
        <a th:href="@{/deck-builder}">デッキビルダー</a> /
        <a th:href="@{/cards}">カード一覧</a>
    </p>

    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="card mb-4">
        <div class="card-header"><strong>部屋を作る(プレイヤー1)</strong></div>
        <div class="card-body">
            <form th:action="@{/rooms}" method="post" class="row g-3" onsubmit="return prepareDeck(this)">
                <div class="col-md-6">
                    <label class="form-label">プレイヤー名</label>
                    <input type="text" name="playerName" class="form-control" placeholder="例: オクソン">
                </div>
                <div class="col-md-6">
                    <label class="form-label">リーダー(デッキ未読込のとき)</label>
                    <select name="leaderCardId" class="form-select">
                        <option th:each="leader : ${leaders}" th:value="${leader.id}"
                                th:text="${leader.civilization.displayName} + ' / ' + ${leader.name}">リーダー</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">デッキファイル(任意)</label>
                    <input type="file" class="form-control" accept=".json" onchange="readDeck(this)">
                    <div class="form-text deck-status">未選択の場合はプリセットデッキ(おまかせ)で対戦します</div>
                    <input type="hidden" name="deckJson">
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">部屋を作成して入室</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-header"><strong>部屋に入る(プレイヤー2)</strong></div>
        <div class="card-body">
            <form th:action="@{/rooms/join}" method="post" class="row g-3" onsubmit="return prepareDeck(this)">
                <div class="col-md-4">
                    <label class="form-label">部屋コード</label>
                    <input type="text" name="roomId" class="form-control text-uppercase" placeholder="ABC123" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">プレイヤー名</label>
                    <input type="text" name="playerName" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">リーダー(デッキ未読込のとき)</label>
                    <select name="leaderCardId" class="form-select">
                        <option th:each="leader : ${leaders}" th:value="${leader.id}"
                                th:text="${leader.civilization.displayName} + ' / ' + ${leader.name}">リーダー</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">デッキファイル(任意)</label>
                    <input type="file" class="form-control" accept=".json" onchange="readDeck(this)">
                    <div class="form-text deck-status">未選択の場合はプリセットデッキ(おまかせ)で対戦します</div>
                    <input type="hidden" name="deckJson">
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-success">入室する</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // デッキファイルはブラウザ側で読み取り、隠しフィールドに載せて通常のフォーム送信で届ける。
    // 中身の正当性はサーバのDeckValidatorが判定する(ここでの確認は表示のためだけ)。
    function readDeck(input) {
        const form = input.closest('form');
        const status = form.querySelector('.deck-status');
        const hidden = form.querySelector('input[name="deckJson"]');
        const file = input.files[0];
        if (!file) {
            hidden.value = '';
            status.textContent = '未選択の場合はプリセットデッキ(おまかせ)で対戦します';
            return;
        }
        const reader = new FileReader();
        reader.onload = () => {
            hidden.value = reader.result;
            try {
                const deck = JSON.parse(reader.result);
                const total = (deck.main || []).reduce((sum, e) => sum + e.count, 0);
                status.textContent = `読み込み: ${deck.name || '(名前なし)'} / メイン${total}枚・禁忌${(deck.taboo || []).length}枚`;
            } catch (e) {
                status.textContent = 'このファイルはJSONとして読めません';
            }
        };
        reader.readAsText(file);
    }

    function prepareDeck(form) {
        return true; // ファイル読み込みはonchangeで完了している
    }
</script>
</body>
</html>
