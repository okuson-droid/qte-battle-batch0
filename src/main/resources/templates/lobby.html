<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QTE Battle - ロビー</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width: 720px">
    <h1 class="mb-1">クイン・タブーエレメンタル</h1>
    <p class="text-muted mb-4">
        部屋を作って、表示された部屋コードをもう1つのタブ(または対戦相手)に伝えてください。
        <a th:href="@{/cards}">カード一覧はこちら</a>
    </p>

    <div class="card mb-4">
        <div class="card-header"><strong>部屋を作る(プレイヤー1)</strong></div>
        <div class="card-body">
            <form th:action="@{/rooms}" method="post" class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">プレイヤー名</label>
                    <input type="text" name="playerName" class="form-control" placeholder="例: オクソン">
                </div>
                <div class="col-md-6">
                    <label class="form-label">リーダー</label>
                    <select name="leaderCardId" class="form-select">
                        <option th:each="leader : ${leaders}" th:value="${leader.id}"
                                th:text="${leader.civilization.displayName} + ' / ' + ${leader.name}">リーダー</option>
                    </select>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">部屋を作成して入室</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-header"><strong>部屋に入る(プレイヤー2)</strong></div>
        <div class="card-body">
            <form th:action="@{/rooms/join}" method="post" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">部屋コード</label>
                    <input type="text" name="roomId" class="form-control text-uppercase" placeholder="ABC123" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">プレイヤー名</label>
                    <input type="text" name="playerName" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">リーダー</label>
                    <select name="leaderCardId" class="form-select">
                        <option th:each="leader : ${leaders}" th:value="${leader.id}"
                                th:text="${leader.civilization.displayName} + ' / ' + ${leader.name}">リーダー</option>
                    </select>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-success">入室する</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
