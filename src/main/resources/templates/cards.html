<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QTE Battle - カードマスタ確認</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <h1 class="mb-1">クイン・タブーエレメンタル</h1>
    <p class="text-muted">
        Batch 0 動作確認: カードマスタ <strong th:text="${totalCards}">0</strong> 枚を読み込み済み /
        現在の部屋数 <span th:text="${roomCount}">0</span>
    </p>

    <div th:each="entry : ${cardsByCivilization}" class="card mb-4">
        <div class="card-header">
            <strong th:text="${entry.key.displayName} + '文明'">文明</strong>
            <span class="badge bg-secondary" th:text="${#lists.size(entry.value)} + '枚'">0枚</span>
        </div>
        <div class="card-body p-0">
            <table class="table table-sm table-striped mb-0 align-middle">
                <thead>
                <tr>
                    <th style="width: 8rem">種別</th>
                    <th style="width: 14rem">名前</th>
                    <th style="width: 4rem">Cost</th>
                    <th style="width: 4rem">Atk</th>
                    <th style="width: 4rem">HP</th>
                    <th style="width: 14rem">キーワード</th>
                    <th>テキスト</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="card : ${entry.value}">
                    <td th:text="${card.type}">MINION</td>
                    <td th:text="${card.name}">名前</td>
                    <td th:text="${card.cost}"></td>
                    <td th:text="${card.attack}"></td>
                    <td th:text="${card.hp}"></td>
                    <td>
                        <span th:each="kw : ${card.keywords}" class="badge text-bg-info me-1"
                              th:text="${kw.displayName}">速攻</span>
                    </td>
                    <td class="small" th:text="${card.text}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
